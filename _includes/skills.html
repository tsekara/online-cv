{% if site.data.data.skills %}
<section class="skills-section section">
  <h2 class="section-title">
    <span class="icon-holder"><i class="fas fa-rocket"></i></span>
    {{ site.data.data.skills.title }}
  </h2>

  <div class="skillset">
    <ul class="resume-bullets">
      {% for item in site.data.data.skills.bullets %}
      <li>{{ item }}</li>
      {% endfor %}
    </ul>
  </div>
</section>
{% endif %}
