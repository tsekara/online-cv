projects:
  title: Key Project Highlights
  intro: >
    Selected project highlights from my work at EMBL and MPI Münster.
  assignments:
  - title: RBP-Driven Mechanisms in Osteosarcoma | Multi-Omics Integration
    link: "#"
    tagline: "EMBL, 2022-2024 — Led the bioinformatics integration of RNA-seq, proteomics, and eRIC data to identify clinically relevant RNA-binding protein-dependent mechanisms in osteosarcoma. Published in Nature Communications (2024)."

  - title: "ATP5A RNA Targets and UTR Sequence Motif Discovery | Sole Bioinformatics Lead"
    link: "#"
    tagline: "EMBL, 2023-2024 — Designed and executed the full bioinformatics analysis pipeline to uncover targets and sequence motifs in the 5' and 3' UTRs of ATP5A. Manuscript on bioRxiv (2024)."

  - title: "DEWseq & htseq-clip | eCLIP/iCLIP Analysis Toolset"
    link: "#"
    tagline: "EMBL, 2019-2021 — Validated DEWseq and htseq-clip on real biological datasets; both tools published on Bioconductor/PyPI with 40+ citations and 10,000+ downloads."

  - title: "TransRefiner | de novo Transcriptome Refinement Tool"
    link: "#"
    tagline: "MPI Münster, 2014-2018 — Independently designed and developed TransRefiner, integrating RNA-seq and Ribo-seq data to refine de novo transcriptome assemblies in non-model organisms."

